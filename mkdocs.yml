site_name: mjollnir
site_description: A stable, reproducible, differentiable market-simulation & calibration substrate for RL research and backtesting
site_url: https://unionpan.github.io/mjollnir/
repo_url: https://github.com/unionpan/mjollnir
repo_name: unionpan/mjollnir

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            members_order: source
            show_root_heading: true

nav:
  - Home: index.md
  - Guide:
      - RL substrate (Mode 1): guide/rl-substrate.md
      - Calibration & backtesting (Mode 2): guide/calibration.md
      - Market impact & multi-agent: guide/multi-agent.md
      - Parameter store & scenarios: guide/params-scenarios.md
      - Reproducibility contract: guide/stability.md
  - Examples: examples.md
  - API reference:
      - mjollnir.jax: reference/jax.md
      - mjollnir.synthetic_data: reference/synthetic_data.md
      - mjollnir.simulations: reference/simulations.md
      - mjollnir.processes: reference/processes.md
      - mjollnir.calibration: reference/calibration.md
      - mjollnir.params: reference/params.md
      - mjollnir.scenarios: reference/scenarios.md
  - Changelog: changelog.md
