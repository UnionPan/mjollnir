name: Nightly

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

jobs:
  jax-prerelease:
    # early warning for the jax 0.10 line: run the suite against pre-releases
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          activate-environment: true  # runner pythons are PEP 668 externally managed; install into a venv
      - run: uv pip install -e ".[dev]"
      - name: Upgrade to jax pre-release
        run: uv pip install -U --pre jax jaxlib
      - run: python -c "import jax; print('jax', jax.__version__)"
      - run: python -m pytest tests/ -q

  audit:
    # dependency vulnerabilities gate here (nightly), not on PRs,
    # so new CVEs don't randomly break feature branches
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          activate-environment: true  # runner pythons are PEP 668 externally managed; install into a venv
      - run: uv pip install -e . pip-audit
      # run pip-audit from inside the venv so it audits the project's
      # environment, not an isolated tool environment
      - run: pip-audit
