name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv tool run ruff check src tests
      - run: uv tool run ruff format --check src tests || true  # format not yet normalized; ratchet

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          activate-environment: true  # runner pythons are PEP 668 externally managed; install into a venv
      - name: Install package
        run: uv pip install -e ".[dev]"
      - name: Run test suite (golden parity is the release gate)
        run: python -m pytest tests/ -q --cov=mjollnir --cov-fail-under=33

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Build sdist & wheel
        run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
